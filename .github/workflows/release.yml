name: Release

# Push a version tag (e.g. v0.1.0) to build the Windows installer and attach it
# to a DRAFT GitHub Release. Or run manually (workflow_dispatch) to smoke-test
# the build. Draft + tag trigger means nothing goes public until you publish the
# release yourself — safe to try on a private repo first.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Release notes come from src/lib/changelog.json (same source as the
      # in-app 更新履歴), so notes are authored once. Fed to tauri-action below.
      - name: Build release notes from changelog
        id: notes
        shell: bash
        run: |
          {
            echo "body<<CHANGELOG_EOF"
            node scripts/release-notes.mjs "${{ github.ref_name }}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the installer and emits latest.json + .sig for the updater.
          # Both are repo Actions secrets (private key + its password); the
          # matching public key is pinned in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On a tag push these resolve to the tag; on manual runs, to the branch
          # (a build-only smoke test — the draft it makes can just be discarded).
          tagName: ${{ github.ref_name }}
          releaseName: "JoyCon2 to Key ${{ github.ref_name }}"
          # Notes from changelog.json → also becomes the updater's latest.json
          # `notes`, shown in the in-app update modal.
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
